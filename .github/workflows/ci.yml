name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    name: CI
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Enable Corepack (Yarn 4)
        run: corepack enable

      - name: Activate Yarn 4.11.0
        run: corepack prepare yarn@4.11.0 --activate

      - name: Cache Yarn cache directory
        uses: actions/cache@v4
        with:
          path: .yarn/cache
          key: yarn-${{ runner.os }}-${{ hashFiles('yarn.lock') }}
          restore-keys: |
            yarn-${{ runner.os }}-

      - name: Install dependencies
        run: yarn install --immutable

      - name: Lint
        run: yarn workspace @abtasty/qa-assistant-react-native lint

      - name: Type-check
        run: yarn workspace @abtasty/qa-assistant-react-native typecheck

      - name: Test
        run: yarn workspace @abtasty/qa-assistant-react-native test:ci

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: ABTastyQAassistant/coverage/lcov.info
          flags: unit
          name: qa-assistant-coverage
          fail_ci_if_error: false

      - name: Build
        run: yarn build

